name: build

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK r29
        run: |
          curl -sLo ndk.zip \
            https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          mv android-ndk-r29 /opt/ndk-r29
          rm ndk.zip

      - name: Build preload.so
        run: |
          make PROJECT=duchamp \
            CC=/opt/ndk-r29/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang

      - name: Verify
        run: |
          file build/duchamp/bin/preload.so
          sha256sum build/duchamp/bin/preload.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: preload-duchamp-aarch64
          path: build/duchamp/bin/preload.so

      - name: Upload to release (manual)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/duchamp/bin/preload.so

  autorelease:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: preload
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Make tag
        id: tag
        run: echo "value=release-${GITHUB_SHA::10}" >> $GITHUB_OUTPUT

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: preload-duchamp-aarch64
          path: .

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: Build ${{ steps.tag.outputs.value }}
          commit: ${{ github.sha }}
          body: "Automated build from commit ${{ github.sha }}"
          artifacts: preload.so
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
